<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Sky Furniture</title>
  <meta name="robots" content="noindex" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { cream: "#F7F3EE", sand: "#E8E0D5", warm: "#C4A77D", ink: "#2C2926", clay: "#8B7355" },
          fontFamily: { display: ['"Cormorant Garamond"', "Georgia", "serif"], sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-cream text-ink antialiased min-h-screen flex flex-col">
  <header class="border-b border-sand">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display text-2xl">Sky Furniture</a>
      <a href="signup.html" class="text-sm text-clay hover:text-ink">Create account</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white border border-sand p-8 shadow-sm">
      <h1 class="font-display text-3xl mb-1">Welcome back</h1>
      <p class="text-sm text-stone-500 font-light mb-4">Sign in with Firebase Authentication</p>

      <div id="auth-error" class="hidden mb-4 text-sm text-red-700 bg-red-50 border border-red-100 px-3 py-2" role="alert"></div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1.5" for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email"
            class="w-full border border-sand bg-cream/40 px-3 py-2.5 text-sm outline-none focus:border-clay" />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1.5" for="password">Password</label>
          <div class="relative">
            <input id="password" name="password" type="password" required autocomplete="current-password"
              class="w-full border border-sand bg-cream/40 px-3 py-2.5 pr-12 text-sm outline-none focus:border-clay" />
            <button type="button" class="password-toggle absolute right-2 top-1/2 -translate-y-1/2 text-xs font-medium text-clay hover:text-ink px-2 py-1"
              data-toggle-password="password" aria-label="Show password">Show</button>
          </div>
        </div>
        <div class="flex justify-end">
          <a href="#" id="forgot-password" class="text-xs text-clay hover:text-ink">Forgot password?</a>
        </div>
        <button type="submit" class="w-full bg-ink text-cream py-3 text-sm font-medium hover:bg-stone-800 transition">Sign in</button>
      </form>

      <p class="mt-6 text-center text-sm text-stone-500">
        New here? <a href="signup.html" class="text-ink font-medium underline">Create an account</a>
      </p>
      <p class="mt-3 text-center text-xs text-stone-400">Keys go in <code class="bg-sand px-1">config/firebase-keys.js</code></p>
    </div>
  </main>

  <script type="module" src="assets/js/auth-pages.js"></script>
</body>
</html>
